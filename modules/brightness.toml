[module]
name = "brightness"
version = "1.0.0"
author = "kaisei contributors"
description = "Simple brightness adjustment"
tags = ["color", "basic", "adjustment"]
type = "module"

[shader]
file = "brightness.frag"
fusible = true
fusion_priority = 0
input_variable = "inputColor"
output_variable = "fragColor"

[[uniforms]]
name = "u_brightness"
type = "float"
default = "0.0"
description = "Brightness offset (-1.0 to 1.0)"
min = -1.0
max = 1.0

[[textures]]
name = "u_inputTexture"
description = "Input image/frame"
optional = false
