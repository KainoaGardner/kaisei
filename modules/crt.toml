[module]
name = "crt"
version = "1.0.0"
author = "kaisei contributors"
description = "CRT monitor effect with curvature and scanlines"
category = "retro"
tags = ["retro", "crt", "scanlines"]
type = "module"

[shader]
file = "crt.frag"
fusible = true
fusion_priority = 0
input_variable = "inputColor"
output_variable = "fragColor"

[dependencies]
requires = []
conflicts = []

[[uniforms]]
name = "u_curvature"
type = "float"
default = "0.15"
description = "Screen curvature amount (0.0 to 0.5)"
min = 0.0
max = 0.5

[[uniforms]]
name = "u_scanlineIntensity"
type = "float"
default = "0.3"
description = "Scanline darkness (0.0 to 1.0)"
min = 0.0
max = 1.0

[[textures]]
name = "u_inputTexture"
description = "Input image/frame"
optional = false
