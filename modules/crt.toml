[module]
name = "crt"
version = "1.5.2"
author = "kaisei contributors"
description = "CRT monitor effect with scanlines and curvature"
tags = ["retro", "crt", "stylization"]
type = "module"

[shader]
file = "crt.frag"
fusible = true
fusion_priority = 0
input_variable = "inputColor"
output_variable = "fragColor"

[[uniforms]]
name = "u_curvature"
type = "float"
default = "0.5"
description = "Screen curvature amount"
min = 0.0
max = 1.0

[[uniforms]]
name = "u_scanlineIntensity"
type = "float"
default = "0.3"
description = "Scanline darkness"
min = 0.0
max = 1.0

[[uniforms]]
name = "u_scanlineCount"
type = "float"
default = "256.0"
description = "Number of scanlines"
min = 50.0
max = 1000.0

[[textures]]
name = "u_inputTexture"
description = "Input image/frame"
optional = false
