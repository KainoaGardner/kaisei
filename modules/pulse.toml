[module]
name = "pulse"
version = "1.0.0"
author = "kaisei contributors"
description = "Pulsating brightness effect using time"
category = "time"
tags = ["time", "animated", "brightness"]
type = "module"

[shader]
file = "pulse.frag"
fusible = true
fusion_priority = 0
input_variable = "inputColor"
output_variable = "fragColor"

[dependencies]
requires = []
conflicts = []

[[uniforms]]
name = "u_speed"
type = "float"
default = "2.0"
description = "Pulse speed (cycles per second)"
min = 0.1
max = 10.0

[[uniforms]]
name = "u_intensity"
type = "float"
default = "0.3"
description = "Pulse intensity (0.0 to 1.0)"
min = 0.0
max = 1.0

[[textures]]
name = "u_inputTexture"
description = "Input image/frame"
optional = false
