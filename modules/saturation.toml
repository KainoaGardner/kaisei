[module]
name = "saturation"
version = "1.0.0"
author = "kaisei contributors"
description = "Adjust color saturation (grayscale to oversaturated)"
tags = ["color", "basic", "adjustment"]
type = "module"

[shader]
file = "saturation.frag"
fusible = true
fusion_priority = 0
input_variable = "inputColor"
output_variable = "fragColor"

[[uniforms]]
name = "u_saturation"
type = "float"
default = "1.0"
description = "Saturation level (0.0 = grayscale, 1.0 = normal, 2.0 = oversaturated)"
min = 0.0
max = 2.0

[[textures]]
name = "u_inputTexture"
description = "Input image/frame"
optional = false
