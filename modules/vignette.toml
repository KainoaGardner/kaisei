[module]
name = "vignette"
version = "1.0.0"
author = "kaisei contributors"
description = "Darken edges of image"
category = "atmosphere"
tags = ["atmosphere", "vignette", "darkening"]
type = "module"

[shader]
file = "vignette.frag"
fusible = true
fusion_priority = 0
input_variable = "inputColor"
output_variable = "fragColor"

[dependencies]
requires = []
conflicts = []

[[uniforms]]
name = "u_strength"
type = "float"
default = "0.5"
description = "Vignette strength (0.0 to 1.0)"
min = 0.0
max = 1.0

[[uniforms]]
name = "u_radius"
type = "float"
default = "0.75"
description = "Vignette radius (0.0 to 1.0)"
min = 0.0
max = 1.0
